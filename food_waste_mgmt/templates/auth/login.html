<!-- templates/auth/login.html -->
{% extends 'base.html' %}
{% block title %}Login – FoodBridge{% endblock %}
{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card">
    <div class="auth-logo text-center mb-4">
      <span style="font-size:2.5rem">🌾</span>
      <h2 class="auth-title mt-2">Welcome Back</h2>
      <p class="text-muted small">Sign in to your FoodBridge account</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group-icon">
          <i class="bi bi-envelope"></i>
          <input type="email" name="email" class="form-control fb-input" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group-icon">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control fb-input" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-accent w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <div class="text-center mt-4">
      <span class="text-muted small">Don't have an account?</span>
      <a href="{{ url_for('auth.register') }}" class="ms-1 text-accent fw-semibold small">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
