<!-- templates/errors/500.html -->
{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5 mt-5">
  <div style="font-size:5rem">⚠️</div>
  <h1 class="display-4 fw-bold text-muted mt-3">500</h1>
  <h4>Something went wrong</h4>
  <p class="text-muted">Our servers encountered an unexpected error. Please try again shortly.</p>
  <a href="{{ url_for('index') }}" class="btn btn-accent mt-3">← Back to Home</a>
</div>
{% endblock %}
